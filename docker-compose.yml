version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: n8n_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 256m

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_automation
    restart: always
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 512m

  openclaw-sales-assistant:
    build: .
    container_name: openclaw_sales_bot
    ports:
      - "8501:8501"
      - "8502:8502"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - LINKEDIN_SESSION_TOKEN=${LINKEDIN_SESSION_TOKEN}
      - LINKEDIN_NAV_TIMEOUT_MS=${LINKEDIN_NAV_TIMEOUT_MS:-30000}
      - LINKEDIN_MAX_EMPLOYEE_CANDIDATES=${LINKEDIN_MAX_EMPLOYEE_CANDIDATES:-3}
      - LINKEDIN_PERSISTENT_SESSION=false
      - LINKEDIN_USER_DATA_DIR=${LINKEDIN_USER_DATA_DIR:-/app/runtime-home/linkedin-profile}
      - LINKEDIN_DEBUG_SCREENSHOTS=${LINKEDIN_DEBUG_SCREENSHOTS:-false}
      - LINKEDIN_LOG_SENSITIVE_DATA=${LINKEDIN_LOG_SENSITIVE_DATA:-false}
      - OPENCLAW_GATEWAY_URL=http://openclaw-gateway:18790
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-demo-openclaw-token}
      - OPENCLAW_DISCOVERY_ENABLED=${OPENCLAW_DISCOVERY_ENABLED:-true}
      - OPENCLAW_AGENT_TIMEOUT_SECONDS=${OPENCLAW_AGENT_TIMEOUT_SECONDS:-90}
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/leads
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - rakip_firma_medya
    restart: unless-stopped
    depends_on:
      - n8n
    mem_limit: 1g

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw-local:2026.3.23-2}
    container_name: openclawpilot_openclaw_gateway
    profiles:
      - openclaw
    entrypoint: ["openclaw"]
    command:
      - gateway
      - run
      - --port
      - "18790"
      - --bind
      - lan
      - --auth
      - token
      - --token
      - ${OPENCLAW_GATEWAY_TOKEN:-demo-openclaw-token}
    ports:
      - "18790:18790"
    environment:
      - OPENCLAW_CONFIG_PATH=/app/openclaw.yml
      - OPENCLAW_STATE_DIR=/app/runtime-home/.openclaw
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-demo-openclaw-token}
      - OPENCLAW_TZ=${OPENCLAW_TZ:-Europe/Istanbul}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - ./runtime-home:/app/runtime-home
      - ./openclaw.yml:/app/openclaw.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
    restart: unless-stopped

networks:
  rakip_firma_medya:
    external: true
    name: rakip_firma_medya_default

volumes:
  postgres_data:
  n8n_data:
