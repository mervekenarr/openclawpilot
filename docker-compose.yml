services:
  postgres:
    image: postgres:16-alpine
    container_name: openclawpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openclawpilot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-openclawpilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  openclaw-gateway:
    profiles: ["openclaw"]
    image: ${OPENCLAW_DOCKER_IMAGE:-openclaw-local:2026.3.23-2}
    container_name: openclawpilot-openclaw
    restart: unless-stopped
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    environment:
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_GATEWAY_PORT: 18789
    command: ["gateway", "run"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - openclaw_home:/home/node/.openclaw

  openclaw-cli:
    profiles: ["openclaw"]
    image: ${OPENCLAW_DOCKER_IMAGE:-openclaw-local:2026.3.23-2}
    depends_on:
      - openclaw-gateway
    network_mode: "service:openclaw-gateway"
    entrypoint: ["openclaw"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - openclaw_home:/home/node/.openclaw

volumes:
  postgres_data:
  openclaw_home:
